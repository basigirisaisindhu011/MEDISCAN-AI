spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:mediscan;DB_CLOSE_DELAY=-1;MODE=MYSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
ocr.service.url=${OCR_SERVICE_URL:http://localhost:8000}
gemini.api.key=${GEMINI_API_KEY:}
server.port=8080
jwt.secret=${JWT_SECRET:mediscan-secret-key}
